name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace (all packages + dev tools)
        run: uv sync --all-packages --group dev --frozen

      # Only the top-level package test suites — the per-task fixture tests
      # under experiments/code-editing/tasks/ run inside their own sandboxes,
      # not here.
      - name: Run unit tests
        run: >-
          uv run --all-packages --group dev python -m pytest
          lib/agent-eval-core/tests
          experiments/file-localization/tests
          experiments/tool-selection/tests
          experiments/code-editing/tests
          -q
